name: Cloud Run Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      mode:
        description: "Choose what to run"
        required: true
        type: choice
        default: deploy
        options:
          - deploy
          - diagnose
          - reconcile

env:
  SERVICE_NAME: belenios
  IMAGE_NAME: belenios
  REGION: us-east1

jobs:
  deploy:
    if: github.event_name == 'push' || inputs.mode == 'deploy'
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Google Auth
      id: auth
      uses: 'google-github-actions/auth@v1'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v1'

    - name: Configure Docker
      run: |
        gcloud auth configure-docker gcr.io --quiet

    - name: Build and Push Container
      run: |
        docker build -f cloudrun/Dockerfile -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest

    - name: Deploy to Cloud Run
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: ${{ env.SERVICE_NAME }}
        image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        region: ${{ env.REGION }}
        flags: '--execution-environment=gen2 --add-volume=name=belenios-data,type=cloud-storage,bucket=belenios --add-volume-mount=volume=belenios-data,mount-path=/mnt/belenios-data'
        env_vars: |
          SMTP_RELAY_HOST=127.0.0.1
          SMTP_RELAY_PORT=12525
          SSH_PRIVATE_KEY_B64=${{ secrets.SSH_PRIVATE_KEY_B64 }}
          SSH_USER=lucas.teles

  diagnose:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'diagnose'
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Google Auth
      uses: 'google-github-actions/auth@v1'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v1'

    - name: Diagnose Cloud Run and Load Balancer
      shell: bash
      run: |
        set -euo pipefail

        echo "PROJECT_ID=$(gcloud config get-value project)"
        echo
        echo "== Cloud Run services in us-east1 =="
        gcloud run services list --platform=managed --region=us-east1 || true
        echo
        echo "== Cloud Run services in southamerica-east1 =="
        gcloud run services list --platform=managed --region=southamerica-east1 || true
        echo
        echo "== belenios service in us-east1 =="
        gcloud run services describe belenios --platform=managed --region=us-east1 \
          --format="yaml(metadata.name,status.url,status.latestReadyRevisionName,status.conditions,spec.template.metadata.annotations,spec.template.spec.containers[0].image)" || true
        echo
        echo "== belenios service in southamerica-east1 =="
        gcloud run services describe belenios --platform=managed --region=southamerica-east1 \
          --format="yaml(metadata.name,status.url,status.latestReadyRevisionName,status.conditions,spec.template.metadata.annotations,spec.template.spec.containers[0].image)" || true
        echo
        echo "== Serverless NEGs =="
        gcloud compute network-endpoint-groups list \
          --filter="name=belenios-neg" \
          --format="table(name,region,networkEndpointType,size)" || true
        echo
        echo "== Backend service belenios-backend =="
        gcloud compute backend-services describe belenios-backend --global \
          --format="yaml(name,backends,protocol,loadBalancingScheme)" || true
        echo
        echo "== URL map belenios-url-map =="
        gcloud compute url-maps describe belenios-url-map --global \
          --format="yaml(name,defaultService,hostRules,pathMatchers)" || true
        echo
        echo "== HTTPS proxy =="
        gcloud compute target-https-proxies describe belenios-https-proxy \
          --format="yaml(name,urlMap,sslCertificates)" || true
        echo
        echo "== Global forwarding rules =="
        gcloud compute forwarding-rules list --global \
          --format="table(name,IPAddress,IPProtocol,portRange,target)" || true
        echo
        echo "== SSL certificate =="
        gcloud compute ssl-certificates describe belenios-cert --global \
          --format="yaml(name,managed.status,managed.domainStatus,subjectAlternativeNames)" || true

  reconcile:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'reconcile'
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Google Auth
      uses: 'google-github-actions/auth@v1'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v1'

    - name: Reconcile regional backend attachments
      shell: bash
      run: |
        set -euo pipefail

        PROJECT_ID="$(gcloud config get-value project)"
        echo "PROJECT_ID=${PROJECT_ID}"

        gcloud run services describe "${SERVICE_NAME}" \
          --platform=managed \
          --region="${REGION}" \
          --format="value(status.url)"

        if ! gcloud compute network-endpoint-groups describe belenios-neg --region="${REGION}" >/dev/null 2>&1; then
          gcloud compute network-endpoint-groups create belenios-neg \
            --region="${REGION}" \
            --network-endpoint-type=serverless \
            --cloud-run-service="${SERVICE_NAME}"
        fi

        if ! gcloud compute backend-services describe belenios-backend --global >/dev/null 2>&1; then
          gcloud compute backend-services create belenios-backend --global
        fi

        CURRENT_GROUPS="$(gcloud compute backend-services describe belenios-backend --global --format='value(backends[].group)' || true)"
        TARGET_SUFFIX="/regions/${REGION}/networkEndpointGroups/belenios-neg"

        if ! printf '%s\n' "${CURRENT_GROUPS}" | grep -Fq "${TARGET_SUFFIX}"; then
          gcloud compute backend-services add-backend belenios-backend \
            --global \
            --network-endpoint-group=belenios-neg \
            --network-endpoint-group-region="${REGION}"
        fi

        while IFS= read -r group; do
          if [[ -z "${group}" ]]; then
            continue
          fi
          if [[ "${group}" == *"/networkEndpointGroups/belenios-neg" && "${group}" != *"${TARGET_SUFFIX}" ]]; then
            stale_region="$(sed -E 's#^.*/regions/([^/]+)/networkEndpointGroups/[^/]+$#\1#' <<<"${group}")"
            gcloud compute backend-services remove-backend belenios-backend \
              --global \
              --network-endpoint-group=belenios-neg \
              --network-endpoint-group-region="${stale_region}"
          fi
        done <<<"${CURRENT_GROUPS}"

        gcloud compute url-maps set-default-service belenios-url-map \
          --default-service=belenios-backend \
          --global

        gcloud compute target-https-proxies update belenios-https-proxy \
          --url-map=belenios-url-map \
          --ssl-certificates=belenios-cert

        echo
        echo "== Backend service after reconcile =="
        gcloud compute backend-services describe belenios-backend --global \
          --format="yaml(name,backends)"

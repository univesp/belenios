name: Cloud Run Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  SERVICE_NAME: belenios
  IMAGE_NAME: belenios
  REGION: us-east1

jobs:
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Google Auth
      id: auth
      uses: 'google-github-actions/auth@v1'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v1'

    - name: Configure Docker
      run: |
        gcloud auth configure-docker gcr.io --quiet

    - name: Build and Push Container
      run: |
        docker build -f cloudrun/Dockerfile -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest

    - name: Deploy to Cloud Run
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: ${{ env.SERVICE_NAME }}
        image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        region: ${{ env.REGION }}
        flags: '--execution-environment=gen2 --add-volume=name=belenios-data,type=cloud-storage,bucket=belenios --add-volume-mount=volume=belenios-data,mount-path=/mnt/belenios-data'
        env_vars: |
          SMTP_RELAY_HOST=127.0.0.1
          SMTP_RELAY_PORT=12525
          SSH_PRIVATE_KEY_B64=${{ secrets.SSH_PRIVATE_KEY_B64 }}
          SSH_USER=lucas.teles

  diagnose:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Google Auth
      uses: 'google-github-actions/auth@v1'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v1'

    - name: Diagnose Cloud Run and Load Balancer
      shell: bash
      run: |
        set -euo pipefail

        echo "PROJECT_ID=$(gcloud config get-value project)"
        echo
        echo "== Cloud Run services in us-east1 =="
        gcloud run services list --platform=managed --region=us-east1 || true
        echo
        echo "== Cloud Run services in southamerica-east1 =="
        gcloud run services list --platform=managed --region=southamerica-east1 || true
        echo
        echo "== belenios service in us-east1 =="
        gcloud run services describe belenios --platform=managed --region=us-east1 \
          --format="yaml(metadata.name,status.url,status.latestReadyRevisionName,status.conditions,spec.template.metadata.annotations,spec.template.spec.containers[0].image)" || true
        echo
        echo "== belenios service in southamerica-east1 =="
        gcloud run services describe belenios --platform=managed --region=southamerica-east1 \
          --format="yaml(metadata.name,status.url,status.latestReadyRevisionName,status.conditions,spec.template.metadata.annotations,spec.template.spec.containers[0].image)" || true
        echo
        echo "== Serverless NEGs =="
        gcloud compute network-endpoint-groups list \
          --filter="name=belenios-neg" \
          --format="table(name,region,networkEndpointType,size)" || true
        echo
        echo "== Backend service belenios-backend =="
        gcloud compute backend-services describe belenios-backend --global \
          --format="yaml(name,backends,protocol,loadBalancingScheme)" || true
        echo
        echo "== URL map belenios-url-map =="
        gcloud compute url-maps describe belenios-url-map --global \
          --format="yaml(name,defaultService,hostRules,pathMatchers)" || true
        echo
        echo "== HTTPS proxy =="
        gcloud compute target-https-proxies describe belenios-https-proxy \
          --format="yaml(name,urlMap,sslCertificates)" || true
        echo
        echo "== Global forwarding rules =="
        gcloud compute forwarding-rules list --global \
          --format="table(name,IPAddress,IPProtocol,portRange,target)" || true
        echo
        echo "== SSL certificate =="
        gcloud compute ssl-certificates describe belenios-cert --global \
          --format="yaml(name,managed.status,managed.domainStatus,subjectAlternativeNames)" || true
